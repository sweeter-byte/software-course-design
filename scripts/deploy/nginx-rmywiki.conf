# /etc/nginx/sites-available/rmywiki.cn
#
# Initial HTTP-only config; `sudo certbot --nginx -d rmywiki.cn -d www.rmywiki.cn`
# will edit this file in place to inject HTTPS listen blocks and a redirect.

server {
    listen 80;
    listen [::]:80;
    server_name rmywiki.cn www.rmywiki.cn;

    # Web SPA (Vite build output deployed here)
    root /var/www/course-web;
    index index.html;

    # Backend API reverse proxy
    location /api/ {
        proxy_pass http://127.0.0.1:4100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 4m;
    }

    # Backend health probe (optional convenience)
    location = /health {
        proxy_pass http://127.0.0.1:4100/health;
    }

    # SPA history fallback — every unknown path falls back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed assets emitted by Vite
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Hide Nginx version
    server_tokens off;
}
